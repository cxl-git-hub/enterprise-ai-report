version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ai-report-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: ai_report
      MYSQL_USER: report
      MYSQL_PASSWORD: report123456
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-report-net

  redis:
    image: redis:7-alpine
    container_name: ai-report-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass redis123456
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-report-net

  minio:
    image: minio/minio:latest
    container_name: ai-report-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-report-net

  backend:
    build:
      context: ../backend-java
      dockerfile: Dockerfile
    container_name: ai-report-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ai_report?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: report
      SPRING_DATASOURCE_PASSWORD: report123456
      SPRING_REDIS_HOST: redis
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ai-report-net

  ai-service:
    build:
      context: ../ai-service-python
      dockerfile: Dockerfile
    container_name: ai-report-ai-service
    environment:
      DATABASE_URL: mysql+asyncmy://report:report123456@mysql:3306/ai_report
      REDIS_URL: redis://:redis123456@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      LLM_API_KEY: ${LLM_API_KEY:-sk-placeholder}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4}
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-report-net

  frontend:
    build:
      context: ../frontend-vue
      dockerfile: Dockerfile
    container_name: ai-report-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ai-report-net

volumes:
  mysql_data:
  redis_data:
  minio_data:

networks:
  ai-report-net:
    driver: bridge
