version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ai-report-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${DB_NAME:-ai_report}
      MYSQL_USER: ${DB_USER:-report}
      MYSQL_PASSWORD: ${DB_PASSWORD:-report123456}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-report-net

  redis:
    image: redis:7-alpine
    container_name: ai-report-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123456}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-report-net

  minio:
    image: minio/minio:latest
    container_name: ai-report-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-report-net

  backend:
    build:
      context: ../backend-java
      dockerfile: Dockerfile
    container_name: ai-report-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${DB_NAME:-ai_report}?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-report}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-report123456}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123456}
      JWT_SECRET: ${JWT_SECRET:-myDefaultSecretKeyForJwtTokenGeneration2024!}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      AI_SERVICE_URL: http://ai-service:8081
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ai-report-net

  ai-service:
    build:
      context: ../ai-service-python
      dockerfile: Dockerfile
    container_name: ai-report-ai-service
    environment:
      DATABASE_URL: mysql+asyncmy://${DB_USER:-report}:${DB_PASSWORD:-report123456}@mysql:3306/${DB_NAME:-ai_report}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123456}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-ai-reports}
      # LLM Configuration - set these in your .env file or shell environment
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-sk-placeholder}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-120.0}
      LLM_API_VERSION: ${LLM_API_VERSION:-2024-02-01}
      LLM_EXTRA_HEADERS: ${LLM_EXTRA_HEADERS:-}
      JWT_SECRET_KEY: ${JWT_SECRET:-myDefaultSecretKeyForJwtTokenGeneration2024!}
    ports:
      - "${AI_SERVICE_PORT:-8081}:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-report-net

  frontend:
    build:
      context: ../frontend-vue
      dockerfile: Dockerfile
    container_name: ai-report-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - ai-report-net

volumes:
  mysql_data:
  redis_data:
  minio_data:

networks:
  ai-report-net:
    driver: bridge
