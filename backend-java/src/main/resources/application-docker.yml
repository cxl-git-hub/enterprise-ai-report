spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/ai_report?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:report}
    password: ${SPRING_DATASOURCE_PASSWORD:report123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:redis123456}

jwt:
  secret: ${JWT_SECRET:myDefaultSecretKeyForJwtTokenGeneration2024!}

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}
  bucket-name: ${MINIO_BUCKET:ai-reports}

ai:
  service:
    url: ${AI_SERVICE_URL:http://ai-service:8081}
    timeout: ${AI_SERVICE_TIMEOUT:60000}

logging:
  level:
    com.enterprise.report: ${LOG_LEVEL:INFO}
    com.baomidou.mybatisplus: ${LOG_LEVEL:WARN}
